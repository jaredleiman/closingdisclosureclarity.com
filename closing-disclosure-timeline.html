<h2>The Full Timeline: Application to Closing</h2>
<p>A typical mortgage closing timeline runs 30–60 days from application to closing. Here's what happens at each stage:</p>
<div class="space-y-0 divide-y divide-outline-variant/20 my-8 border border-outline-variant/20">
  <div class="flex gap-5 p-5"><div class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center font-headline text-lg shrink-0">1</div><div><p class="font-headline text-lg text-primary mb-1">Loan Application Submitted</p><p class="text-sm text-on-surface-variant font-light">You submit your formal mortgage application with income docs, tax returns, bank statements, and employment information.</p></div></div>
  <div class="flex gap-5 p-5"><div class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center font-headline text-lg shrink-0">2</div><div><p class="font-headline text-lg text-primary mb-1">Loan Estimate Issued (Days 1–3)</p><p class="text-sm text-on-surface-variant font-light">Federal law requires your lender to provide a Loan Estimate within 3 business days. Save this document — you'll compare it to your Closing Disclosure later.</p></div></div>
  <div class="flex gap-5 p-5"><div class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center font-headline text-lg shrink-0">3</div><div><p class="font-headline text-lg text-primary mb-1">Underwriting (Days 3–30)</p><p class="text-sm text-on-surface-variant font-light">Your loan file goes to underwriting. The underwriter reviews your complete financial profile, orders an appraisal, and may request additional documentation.</p></div></div>
  <div class="flex gap-5 p-5"><div class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center font-headline text-lg shrink-0">4</div><div><p class="font-headline text-lg text-primary mb-1">Clear to Close (Days 30–50)</p><p class="text-sm text-on-surface-variant font-light">All conditions satisfied. Your lender issues a "clear to close" (CTC) — the closest thing to a final approval.</p></div></div>
  <div class="flex gap-5 p-5 bg-primary-fixed/20 border-l-4 border-tertiary-fixed-dim"><div class="w-10 h-10 bg-tertiary text-on-tertiary rounded-full flex items-center justify-center font-headline text-lg shrink-0">5</div><div><p class="font-headline text-lg text-primary mb-1">Closing Disclosure Delivered — Review Window Begins</p><p class="text-sm text-on-surface-variant font-light">At least 3 business days before closing. <strong>This is when you review, compare to your LE, and flag any concerns in writing.</strong></p></div></div>
  <div class="flex gap-5 p-5"><div class="w-10 h-10 bg-primary text-on-primary rounded-full flex items-center justify-center font-headline text-lg shrink-0">6</div><div><p class="font-headline text-lg text-primary mb-1">Closing &amp; Funding</p><p class="text-sm text-on-surface-variant font-light">You sign your closing documents. Funds are disbursed. Title transfers. You receive your keys.</p></div></div>
</div>
<h2>What to Do During the 3-Day Window</h2>
<ol><li>Pull out your original Loan Estimate and compare it side by side with the CD</li><li>Check every fee in Section A (zero tolerance — no increases allowed)</li><li>Verify your interest rate matches your rate lock confirmation</li><li>Confirm lender credits appear if any were promised</li><li>Review your cash-to-close and understand any differences from the LE</li><li>Contact your lender in writing if anything looks off</li></ol>
<div class="callout"><div class="callout-label">Timeline Tip</div><p>Ask your lender early when they expect to deliver the Closing Disclosure. A lender who plans well will have it ready 5–7 days before closing. A CD delivered with only the minimum 3-day window is a sign of a rushed process.</p></div>
<h2>Common Reasons Closings Get Delayed</h2>
<ul><li><strong>Late Closing Disclosure</strong> — lender delivers CD too close to the scheduled closing date</li><li><strong>Appraisal issues</strong> — low appraisal requiring renegotiation or additional down payment</li><li><strong>Title issues</strong> — liens, ownership disputes, or public record errors</li><li><strong>Buyer financial changes</strong> — new debt, job change, or credit issues discovered at final review</li></ul>
