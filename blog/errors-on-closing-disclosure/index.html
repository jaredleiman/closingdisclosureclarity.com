<h2 id="first-step">The First Thing to Do When You Spot an Error</h2>
<p>Before you do anything else, pull out your Loan Estimate and put it next to your Closing Disclosure. Almost every meaningful CD error reveals itself when these two documents are compared line by line.</p>
<p>Then write down exactly which line, which page, and which dollar amount looks wrong. Lenders move quickly during the days before closing, and a vague complaint ("something looks off on page 2") gets a vague response. A specific complaint ("Section A line 02, your origination charge increased from $1,495 on the Loan Estimate to $1,795 on the CD") gets a specific answer.</p>
<p>Once you have the specifics in writing, email your loan officer and your closing agent at the same time. Putting both parties on the same email creates a paper trail and makes it much harder for the issue to get bounced between them.</p>

<div class="callout"><div class="callout-label">Key Fact</div><p>You have the legal right to question anything on your Closing Disclosure before signing. Once you sign, the document is binding — so the time to raise issues is during your three-day review window, not at the closing table.</p></div>

<h2 id="minor-vs-major">Minor Errors vs. Errors That Trigger a New 3-Day Wait</h2>
<p>Not every error delays closing. Federal rules under the TRID (TILA-RESPA Integrated Disclosure) framework distinguish between minor changes that can be fixed at the closing table and significant changes that legally require your lender to issue a corrected CD and start the three-day waiting period over again.</p>
<table><thead><tr><th>Type of Error</th><th>What Happens</th><th>Closing Delayed?</th></tr></thead><tbody>
<tr><td><strong>Typo in your name or address</strong></td><td>Corrected at closing table</td><td>No</td></tr>
<tr><td><strong>Math error under $100</strong></td><td>Corrected via revised CD</td><td>No</td></tr>
<tr><td><strong>APR increase of more than 1/8%</strong></td><td>New 3-day waiting period</td><td>Yes</td></tr>
<tr><td><strong>Loan product change (e.g. fixed to ARM)</strong></td><td>New 3-day waiting period</td><td>Yes</td></tr>
<tr><td><strong>Prepayment penalty added</strong></td><td>New 3-day waiting period</td><td>Yes</td></tr>
<tr><td><strong>Most fee corrections</strong></td><td>Corrected via revised CD</td><td>No</td></tr>
</tbody></table>
<p>Three categories trigger the new waiting period: a meaningful APR change, a change in loan product, or the addition of a prepayment penalty. Everything else can usually be corrected without delaying your closing date.</p>

<div class="alert"><div class="alert-label">Important</div><p>Some lenders try to discourage corrections by warning that any change will delay closing. That's not always true. If the error doesn't fall into one of the three categories above, your lender can issue a revised CD and proceed on schedule.</p></div>

<h2 id="common-errors">The 7 Most Common Closing Disclosure Errors</h2>
<h3>1. Fees in Section A That Increased From the Loan Estimate</h3>
<p>Origination charges in Section A have zero tolerance — they cannot legally increase between your Loan Estimate and your CD. If your application fee, underwriting fee, or processing fee jumped, your lender owes you a refund. This is the single most common — and most expensive — CD error.</p>

<h3>2. The Wrong Interest Rate</h3>
<p>Compare your CD to your rate lock agreement. If you locked at 6.875% and your CD shows 7.0%, that's a clerical error that needs fixing before you sign. The rate on your CD becomes the rate on your loan.</p>

<h3>3. Missing Lender Credits</h3>
<p>If your lender promised a credit toward closing costs, that credit should appear on page 2 as a negative number. Lender credits get omitted more often than people realize, especially when loan officers change roles mid-transaction.</p>

<h3>4. Cash to Close That Doesn't Match the Math</h3>
<p>Add up your fees, prepaids, escrow, and down payment. Subtract any credits and your earnest money deposit. The result should match the cash-to-close figure on page 3. If it doesn't, something is being added or omitted somewhere.</p>

<h3>5. Wrong Property Tax or Insurance Amounts</h3>
<p>Escrow line items pull from estimates, and those estimates aren't always current. If your property tax or homeowners insurance figure looks too low, your monthly payment will jump in 12 months when escrow analysis catches up.</p>

<h3>6. Seller Credits Listed Incorrectly</h3>
<p>If the seller agreed to contribute to closing costs, that credit should appear in the right section on page 3. Seller credits are routinely misallocated — sometimes shown as a buyer credit, sometimes split incorrectly between sections.</p>

<h3>7. The Wrong Loan Amount</h3>
<p>Less common but worth checking. If you're financing $375,000 and your CD shows $385,000, the entire document is wrong from page 1 forward. This usually traces back to a last-minute change order that wasn't fully processed.</p>

<h2 id="how-to-push-back">How to Push Back on Your Lender</h2>
<p>When you raise an error, expect three possible responses from your loan officer. Knowing which one you're getting tells you what to do next.</p>
<ul>
<li><strong>"You're right, we'll send a revised CD."</strong> Best case. Confirm in writing what's being corrected and request the revised CD as soon as possible.</li>
<li><strong>"That's not actually an error — here's why."</strong> Ask for the explanation in writing. Sometimes the explanation is legitimate (a fee category was reclassified, a tax estimate was updated). Sometimes it isn't. Get it on paper either way.</li>
<li><strong>"That fee always was that amount."</strong> Pull out your Loan Estimate. If the LE shows a different number, your lender's claim is wrong, and you have documentation to prove it.</li>
</ul>
<p>If your loan officer pushes back on a clearly documented error, escalate. Most mortgage lenders have a compliance department or a quality control team specifically for these issues. Your closing agent — typically a title company or settlement attorney — also has leverage and a strong incentive to keep the closing on schedule.</p>

<h2 id="refunds">When You're Owed a Refund</h2>
<p>If a fee in a zero-tolerance category increased between your Loan Estimate and your CD, federal rules generally require your lender to refund the excess. The refund must appear as a credit on the CD before closing or, if it's discovered after, sent to you within 60 days of closing.</p>
<p>The zero-tolerance categories are:</p>
<ul>
<li>All origination charges in Section A</li>
<li>Transfer taxes in Section E</li>
<li>Fees for services from a provider you couldn't shop for</li>
</ul>
<p>Fees in the 10-percent tolerance bucket (Section C — services you could shop for) can increase, but only if the total increase across all such fees stays under 10%. If they collectively jumped by more than 10%, you're owed a refund of the excess.</p>

<div class="callout"><div class="callout-label">Bottom Line</div><p>Errors on Closing Disclosures are common — and most of them can be corrected without delaying your closing. The cost of finding them is a careful side-by-side review with your Loan Estimate. The cost of missing them is paying fees you didn't agree to, sometimes for the full life of your loan.</p></div>
