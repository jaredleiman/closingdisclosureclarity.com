<h2>Why the Comparison Matters</h2>
<p>When you applied for your mortgage, you received a Loan Estimate (LE). Now, close to closing, you've received the Closing Disclosure (CD). The CFPB designed both using the same section structure intentionally — so you can place them side by side and see exactly what changed. Most homebuyers don't do this. Those who do often find discrepancies worth thousands of dollars.</p>
<h2>The Three Tolerance Categories</h2>
<table><thead><tr><th>Category</th><th>What's Included</th><th>Max Increase Allowed</th></tr></thead><tbody>
<tr><td><strong>Zero tolerance</strong></td><td>Lender origination charges (underwriting, processing, application fees), transfer taxes, required services you couldn't shop</td><td>Cannot increase at all</td></tr>
<tr><td><strong>10% tolerance</strong></td><td>Recording fees, required third-party services from lender's list</td><td>Up to 10% aggregate increase</td></tr>
<tr><td><strong>No limit</strong></td><td>Prepaid interest, homeowner's insurance, property tax escrow, optional services</td><td>Can change without limit</td></tr>
</tbody></table>
<h2>What to Compare, Section by Section</h2>
<h3>Section A — Origination Charges (Zero Tolerance)</h3>
<p>This is the most important comparison. Section A lists all fees your lender charges directly: underwriting fees, processing fees, origination points, application fees. Every fee in Section A has zero tolerance — if the number on your CD is higher than your LE, your lender needs to explain it or issue a credit.</p>
<h3>Section B — Services You Cannot Shop For (Zero Tolerance)</h3>
<p>Appraisal, credit report, flood determination, and tax monitoring. These also carry zero tolerance. If the appraisal fee increased from your LE, that's a potential violation unless a valid change of circumstance was documented.</p>
<h3>Section C — Services You Can Shop For (10% Tolerance)</h3>
<p>Title insurance, settlement agent fees, title search. The 10% tolerance applies to the total of all fees in this section combined, not each fee individually.</p>
<h3>Sections F and G — Prepaids and Escrow (No Limit)</h3>
<p>These can legitimately change without limit. Prepaid interest depends on your exact closing date. Don't be alarmed if these shifted — focus your attention on Sections A, B, and C.</p>
<div class="callout"><div class="callout-label">Most Common Violation</div><p>In CFPB enforcement data, the most frequently cited TRID violation is an increase in lender origination charges — specifically the underwriting fee — between the Loan Estimate and Closing Disclosure. If yours increased, ask for a written explanation referencing a documented valid change of circumstance.</p></div>
<h2>Valid Reasons Fees Can Change</h2>
<p>Lenders can issue a revised Loan Estimate (resetting the tolerance baseline) if a "valid change of circumstance" occurs:</p>
<ul><li>An extraordinary event beyond anyone's control</li><li>Information relied on when issuing the LE was inaccurate</li><li>New information about the borrower not available at application</li><li>A change in loan terms requested by the borrower</li><li>A rate lock expiration</li></ul>
<p>The changed circumstance must have been documented within three business days of the lender learning about it.</p>
