<h2 id="what-is">What a Closing Disclosure Actually Is</h2>
<p>A Closing Disclosure (CD) is a federally standardized 5-page document that your mortgage lender is legally required to give you at least three business days before your closing date. It contains a complete, itemized list of every fee, charge, credit, and term associated with your mortgage loan.</p>
<p>The Closing Disclosure was created by the Consumer Financial Protection Bureau (CFPB) as part of the TRID rule — TILA-RESPA Integrated Disclosure. Before TRID took effect in 2015, homebuyers received multiple separate forms that were notoriously difficult to compare. The CD replaced all of them with a single standardized document.</p>
<p>The form is standardized across all lenders — meaning the layout is identical whether you're borrowing from a large national bank or an independent mortgage company. That standardization is intentional: it makes the document comparable and auditable.</p>

<div class="callout"><div class="callout-label">Key Fact</div><p>The Closing Disclosure is legally binding. Once you sign it, the terms it contains — including fees, interest rate, and loan amount — are locked in. This is why reviewing it carefully before your closing appointment matters so much.</p></div>

<h2 id="sections">The 5 Pages — Section by Section</h2>
<h3>Page 1 — Loan Terms and Projected Payments</h3>
<p>The first page gives you the essential facts: loan amount, interest rate, monthly principal and interest payment, and whether your rate or payments can increase over time. It also shows your projected monthly payment broken down into principal, interest, mortgage insurance, and estimated escrow.</p>

<h3>Page 2 — Closing Cost Details</h3>
<p>Page 2 is the most important page for fee review. It lists every closing cost organized into sections A through H:</p>
<table><thead><tr><th>Section</th><th>What It Covers</th><th>Tolerance</th></tr></thead><tbody>
<tr><td><strong>A</strong></td><td>Origination charges (lender fees)</td><td>Zero — cannot increase</td></tr>
<tr><td><strong>B</strong></td><td>Services you cannot shop for</td><td>Zero — cannot increase</td></tr>
<tr><td><strong>C</strong></td><td>Services you can shop for</td><td>10% aggregate</td></tr>
<tr><td><strong>E</strong></td><td>Taxes and government fees</td><td>Zero tolerance</td></tr>
<tr><td><strong>F</strong></td><td>Prepaids (insurance, interest)</td><td>No limit</td></tr>
<tr><td><strong>G</strong></td><td>Initial escrow payment</td><td>No limit</td></tr>
</tbody></table>

<h3>Page 3 — Cash to Close and Summaries</h3>
<p>Page 3 shows your final cash-to-close figure — the exact amount you need to bring to the closing table — plus transaction summaries for buyer and seller.</p>

<h3>Pages 4 &amp; 5 — Disclosures and Loan Calculations</h3>
<p>Page 4 covers loan feature disclosures: escrow account details, loan transfer policies, and late payment terms. Page 5 shows total interest paid over the life of the loan, your APR, and contact information for all parties.</p>

<h2 id="timeline">The 3-Day Rule</h2>
<p>Under federal law, your lender must provide your Closing Disclosure at least three business days before your scheduled closing. This is not a suggestion — it is a legal requirement. The three-day window exists specifically to give you time to review the document before signing anything.</p>
<div class="alert"><div class="alert-label">Important</div><p>If your lender sends your Closing Disclosure late — less than three business days before closing — federal rules require your closing to be postponed. You have the legal right to that review period.</p></div>

<h2 id="vs-le">How It Compares to Your Loan Estimate</h2>
<p>When you applied for your mortgage, you received a Loan Estimate (LE) — another standardized CFPB form. The Closing Disclosure is designed to be directly comparable to it, using the same section structure so you can spot any changes.</p>
<p>TRID rules place strict limits on how much certain fees can change between the LE and the CD. Fees in zero-tolerance categories — primarily lender origination charges — cannot increase at all. If your lender charges more than tolerance limits allow, they are generally required to refund the excess. But you have to catch it first.</p>

<h2 id="what-to-check">What to Look For Before You Sign</h2>
<ul>
<li><strong>Compare to your Loan Estimate.</strong> Put both documents side by side and look for any fee that increased.</li>
<li><strong>Check Section A carefully.</strong> Origination charges have zero tolerance. Any increase from your LE is a potential violation.</li>
<li><strong>Look for junk fees.</strong> Fees labeled "administrative fee" or "document preparation fee" that weren't on your LE are worth questioning.</li>
<li><strong>Verify your interest rate.</strong> Confirm the rate on your CD matches your rate lock agreement.</li>
<li><strong>Check your cash-to-close.</strong> If higher than projected, understand why before signing.</li>
<li><strong>Verify lender credits.</strong> If your lender promised credits, make sure they appear on page 2.</li>
</ul>
