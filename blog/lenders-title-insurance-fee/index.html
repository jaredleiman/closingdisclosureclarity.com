<h2>What Lender's Title Insurance Covers</h2>
<p>Title insurance protects against problems with a property's ownership history — undiscovered liens, forged deeds, errors in public records, or competing claims of ownership that could surface after you buy the home.</p>
<p>The <strong>lender's title insurance policy</strong> specifically protects your mortgage lender. If a title defect emerges, the lender's policy covers them up to the loan amount. Almost all mortgage lenders require it as a condition of the loan.</p>
<h2>Lender's Policy vs. Owner's Policy</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-8">
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><h3 class="font-headline text-xl text-primary mt-0 mb-3">Lender's Policy</h3><ul class="text-sm"><li>Protects the lender up to the loan amount</li><li>Required for virtually all mortgage transactions</li><li>Premium paid once at closing</li><li>Coverage declines as you pay down the loan</li></ul></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><h3 class="font-headline text-xl text-primary mt-0 mb-3">Owner's Policy</h3><ul class="text-sm"><li>Protects you up to the purchase price</li><li>Optional in most states, but strongly recommended</li><li>Coverage lasts as long as you or your heirs own the property</li><li>Usually costs somewhat more than lender's policy</li></ul></div>
</div>
<h2>What's Typical for Title Insurance Fees?</h2>
<p>Title insurance premiums vary significantly by state because most states regulate rates. In some states, every title company must charge the same amount. As a rough guide for a $400,000 purchase:</p>
<ul><li><strong>Lender's title insurance:</strong> $500–$1,200 (varies by state and loan amount)</li><li><strong>Owner's title insurance:</strong> $800–$2,500 (higher because coverage is based on purchase price)</li><li><strong>Simultaneous issue discount:</strong> Many title companies offer a discount when both policies are purchased together</li></ul>
<div class="callout"><div class="callout-label">Check the Filed Rate</div><p>In states with regulated title insurance rates, you can verify whether you're being charged correctly by asking your title company for the rate manual or calculation showing how your premium was derived. Overcharges above the filed rate do occur.</p></div>
<h2>Can You Shop for Title Insurance?</h2>
<p>Yes — and your lender is required to tell you that you can. Title insurance appears in Section C of both your LE and CD — the "services you can shop for" section. You can choose your own title company, potentially at a lower cost. Getting a quote from one or two additional title companies before closing is worth considering — premiums can vary by hundreds of dollars.</p>
<h2>What to Check on Your Closing Disclosure</h2>
<ul><li>Confirm both the lender's and owner's policy premiums appear if you purchased both</li><li>Compare amounts to your Loan Estimate — Section C has a 10% aggregate tolerance</li><li>Ask your title company for the rate calculation if the premium seems high</li><li>Verify you're receiving any simultaneous issue discount if both policies are being issued</li></ul>
