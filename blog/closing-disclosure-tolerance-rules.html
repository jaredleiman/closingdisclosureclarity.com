<h2 id="what-are-tolerances">What Tolerance Rules Actually Are</h2>
<p>When you applied for your mortgage, your lender gave you a Loan Estimate listing every projected fee. Three days before closing, you receive your Closing Disclosure with the final numbers. The TRID tolerance rules govern how much those numbers can change between the two documents.</p>
<p>The rules exist because before TRID took effect in 2015, fees routinely jumped between application and closing — sometimes by thousands of dollars — and homebuyers had no recourse. The Consumer Financial Protection Bureau set the tolerance rules to put real teeth into the Loan Estimate. If a lender quotes a fee on the LE, they're now legally bound to deliver close to that number on the CD, depending on which tolerance bucket the fee falls into.</p>
<p>Tolerance rules are the reason it's worth comparing your Loan Estimate and Closing Disclosure side by side. Fees that exceed tolerance limits aren't just unfair — they're refundable.</p>

<h2 id="three-buckets">The Three Tolerance Buckets</h2>
<p>Every fee on your Closing Disclosure falls into one of three categories:</p>
<table><thead><tr><th>Bucket</th><th>Fees Included</th><th>How Much Can Change</th></tr></thead><tbody>
<tr><td><strong>Zero tolerance</strong></td><td>Lender fees, transfer taxes, services you can't shop for</td><td>Cannot increase at all</td></tr>
<tr><td><strong>10% tolerance</strong></td><td>Services you can shop for (using lender's list)</td><td>10% in aggregate</td></tr>
<tr><td><strong>No tolerance limit</strong></td><td>Prepaids, escrow, services from your own provider</td><td>Can change freely</td></tr>
</tbody></table>
<p>The bucket a fee belongs to is determined by what kind of fee it is and, in some cases, by the choices you made during the loan process. Knowing which bucket each fee falls into is the key to spotting overcharges.</p>

<h2 id="zero-tolerance">Zero Tolerance: Fees That Cannot Change</h2>
<p>Zero-tolerance fees cannot increase at all between your Loan Estimate and your Closing Disclosure. If they do, your lender is required to credit you the difference — either on the CD itself or as a post-closing refund.</p>
<p>The zero-tolerance bucket includes:</p>
<ul>
<li><strong>Lender origination charges</strong> in Section A — application fees, underwriting fees, processing fees, and any other charge labeled an origination cost</li>
<li><strong>Transfer taxes</strong> in Section E — government taxes on the transfer of property</li>
<li><strong>Services in Section B</strong> — services you cannot shop for, where the lender chose the provider (like the lender's required appraisal or credit report)</li>
</ul>
<p>The logic behind this bucket is straightforward: these are fees the lender controls or knows with certainty at the time of application. There's no legitimate reason for them to change.</p>

<div class="alert"><div class="alert-label">Watch For This</div><p>The most common zero-tolerance violation is a lender adding a new fee to Section A that wasn't on your Loan Estimate — often labeled "administrative fee," "document preparation fee," or "compliance fee." A new fee in Section A is the same as an increase from zero. It's still a tolerance violation.</p></div>

<h2 id="ten-percent">10% Tolerance: Fees That Can Move Within Limits</h2>
<p>The 10% tolerance bucket covers services you can shop for — appraisals, title insurance, settlement services, surveys — when you use a provider from the lender's written list. The total of all fees in this bucket on your CD cannot exceed the total on your Loan Estimate by more than 10%.</p>
<p>Critically, this is an <strong>aggregate</strong> 10%, not a per-fee 10%. That means individual fees within the bucket can increase by more than 10% as long as the total increase across all of them stays under the limit.</p>

<h3>How the 10% Calculation Works</h3>
<p>Suppose your Loan Estimate shows three Section C fees totaling $2,000. On your Closing Disclosure, those same three fees total $2,150. The aggregate increase is $150, or 7.5% — within tolerance, no refund owed.</p>
<p>But if those same three fees totaled $2,300 on your CD, that's a $300 aggregate increase, or 15% — over tolerance. Your lender owes you a $100 credit (the amount above the 10% limit).</p>

<div class="callout"><div class="callout-label">Important Distinction</div><p>The 10% rule only applies if you used a provider from the lender's written list. If you chose your own title company or settlement provider — one not on the lender's list — those fees fall into the no-tolerance-limit bucket and can change freely.</p></div>

<h2 id="no-tolerance">No Tolerance Limit: Fees That Can Change Freely</h2>
<p>Some fees on your Closing Disclosure aren't governed by tolerance rules at all. These can increase by any amount without triggering a refund obligation:</p>
<ul>
<li><strong>Prepaids in Section F</strong> — homeowners insurance premiums, prepaid interest, prepaid property taxes</li>
<li><strong>Initial escrow deposit in Section G</strong> — the cushion your lender holds for future tax and insurance payments</li>
<li><strong>Services from a provider you chose yourself</strong> — if you didn't use the lender's list, the fee is exempt from the 10% rule</li>
<li><strong>Owner's title insurance</strong> — when not required by the lender</li>
</ul>
<p>These fees aren't tolerance-protected because they're either based on third-party costs the lender doesn't control (like your insurance premium) or based on your own independent choice of provider.</p>
<p>Just because these fees can change freely doesn't mean you should accept large increases without explanation. A homeowners insurance premium that doubles between LE and CD is worth a phone call to your insurance agent, even if it's not refundable from your lender.</p>

<h2 id="changed-circumstances">When Tolerances Reset: Changed Circumstances</h2>
<p>Tolerance rules have one major exception: a "changed circumstance." If something material about the loan or the borrower changes after the Loan Estimate was issued, the lender can reissue a revised Loan Estimate with new fee figures, and tolerances reset to those new numbers.</p>
<p>Legitimate changed circumstances include:</p>
<ul>
<li>The borrower's credit score, income, or employment status changes</li>
<li>The property's appraised value comes in lower than expected</li>
<li>New information about the property is discovered (e.g. it's in a flood zone)</li>
<li>The borrower requests a different loan product or term</li>
<li>Information the borrower provided turns out to be inaccurate</li>
</ul>
<p>What does <em>not</em> count as a changed circumstance: the lender simply realizing they underquoted a fee, or a third-party provider raising their price. Those are the lender's risk to absorb.</p>

<div class="alert"><div class="alert-label">Important</div><p>If your lender claims a changed circumstance to justify a fee increase, you have the right to ask what specifically changed and to see the revised Loan Estimate. The reason has to be documented and provided to you within 3 business days of the lender learning about the change.</p></div>

<h2 id="refunds">When You're Owed a Refund</h2>
<p>When your lender violates a tolerance rule, they owe you a credit. The federal rule requires the credit to appear:</p>
<ul>
<li><strong>On the Closing Disclosure itself</strong> — as a lender credit reducing your cash to close, OR</li>
<li><strong>As a post-closing refund</strong> — sent to you within 60 days of consummation</li>
</ul>
<p>The refund obligation isn't waivable, and the lender doesn't get to decide whether to issue one. If a fee on your CD exceeds its tolerance limit, the credit is owed by federal rule.</p>
<p>Most tolerance violations are caught at closing, before signing — which is why the three-day review window matters so much. But violations are sometimes discovered after the fact, when a homeowner reviews their documents weeks or months later. The 60-day post-closing refund window is the legal safety net.</p>

<div class="callout"><div class="callout-label">Bottom Line</div><p>Tolerance rules turn the Loan Estimate from a casual quote into a legal commitment. The cost of understanding which fees fall into which bucket is one careful side-by-side comparison of your two documents. The cost of not understanding can be hundreds or thousands of dollars in fees you didn't legally have to pay.</p></div>
