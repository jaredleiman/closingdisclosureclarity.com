<h2>What the Underwriting Fee Actually Pays For</h2>
<p>The underwriting fee is a charge your lender collects to compensate for the cost of reviewing and approving your loan application. Underwriting involves verifying your income, employment, assets, and creditworthiness — and assessing whether the loan meets the lender's guidelines.</p>
<p>In practice, most underwriting at large lenders is partly or largely automated. The underwriting fee funds the entire underwriting infrastructure — systems, personnel, and compliance overhead — not just the time a single person spends on your file.</p>
<div class="bg-surface-container-lowest border border-outline-variant/20 p-8 my-8 flex gap-6 items-center">
  <div class="font-headline text-5xl text-primary shrink-0">$400–$900</div>
  <div><p class="font-label text-sm font-semibold uppercase tracking-wider text-on-surface mb-1">Typical underwriting fee range</p><p class="text-sm text-on-surface-variant font-light">for a standard residential mortgage. Fees above $1,000 are worth questioning. Any increase from your Loan Estimate is a potential TRID violation.</p></div>
</div>
<h2>Why It Has Zero Tolerance Under TRID</h2>
<p>The underwriting fee falls in Section A of your Closing Disclosure — lender origination charges. Under TRID rules, Section A fees have zero tolerance: they cannot increase from the amount shown on your Loan Estimate to the amount shown on your Closing Disclosure.</p>
<p>This is the most frequently cited category in TRID enforcement actions. Lenders sometimes increase underwriting fees by $200–$500 between the LE and CD — sometimes by accident, sometimes not. Either way, they're generally required to remedy it.</p>
<div class="alert"><div class="alert-label">If Your Underwriting Fee Increased</div><p>Contact your lender in writing before closing. Ask them to identify the valid changed circumstance that justifies the increase. If none exists, they are generally required to issue a credit for the excess at or after closing.</p></div>
<h2>Can You Negotiate the Underwriting Fee?</h2>
<p>You can negotiate — but timing matters. Underwriting fees are most negotiable before you've formally applied with a specific lender. When comparing lenders, ask each one to break down their Section A fees so you can compare apples to apples. A lender with a $500 underwriting fee and a 7.0% rate may cost more or less than a lender with an $800 fee and a 6.875% rate, depending on your loan amount and timeline.</p>
<h2>Common Names for the Underwriting Fee</h2>
<p>Lenders use different labels for what is functionally an underwriting fee. Watch for these in Section A of both documents:</p>
<ul><li><strong>Underwriting fee</strong> — most common</li><li><strong>Lender fee</strong> — generic term sometimes used</li><li><strong>Administrative fee</strong> — often a bundled charge</li><li><strong>Processing fee</strong> — covers loan file processing, sometimes charged separately</li><li><strong>Origination fee</strong> — can be flat or a percentage of loan amount</li></ul>
<div class="callout"><div class="callout-label">Watch For This</div><p>Some lenders split what was one fee on the LE into two fees on the CD — for example, listing both an "underwriting fee" and a new "processing fee" when only the underwriting fee appeared on the LE. Adding a new Section A fee is treated the same as increasing an existing one: a zero-tolerance violation.</p></div>
