<h2>What the Closing Disclosure Form Is</h2>
<p>The Closing Disclosure form (CFPB Form H-25) is the standardized 5-page document that all mortgage lenders must use for residential real estate transactions. It was created by the Consumer Financial Protection Bureau and replaced the HUD-1 Settlement Statement in 2015.</p>
<p>Because it's federally standardized, every lender uses the exact same form layout. This makes it directly comparable to your Loan Estimate and easier to review once you know where to look.</p>
<h2>How You Receive Your Closing Disclosure</h2>
<p>Your lender prepares and delivers your Closing Disclosure — you don't need to find the form yourself. Most lenders deliver it electronically through their mortgage portal or by email, at least three business days before your closing date. If your lender is mailing a paper copy, the law assumes you received it three business days after the mailing date.</p>
<div class="alert"><div class="alert-label">If Your CD Is Late</div><p>If you haven't received your Closing Disclosure and your closing is less than a week away, contact your loan officer immediately. A late CD requires postponing the closing.</p></div>
<h2>The 5 Pages at a Glance</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-8">
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><div class="font-headline text-4xl text-tertiary-fixed-dim mb-2">1</div><p class="font-headline text-lg text-primary mb-1">Loan Terms &amp; Projected Payments</p><p class="text-sm text-on-surface-variant font-light">Interest rate, loan amount, monthly payment breakdown, estimated total monthly payment including taxes and insurance.</p></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><div class="font-headline text-4xl text-tertiary-fixed-dim mb-2">2</div><p class="font-headline text-lg text-primary mb-1">Closing Cost Details</p><p class="text-sm text-on-surface-variant font-light">Itemized list of every closing fee organized into sections A through H. The most important page for fee review.</p></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><div class="font-headline text-4xl text-tertiary-fixed-dim mb-2">3</div><p class="font-headline text-lg text-primary mb-1">Cash to Close &amp; Summaries</p><p class="text-sm text-on-surface-variant font-light">Final cash-to-close figure, comparison to Loan Estimate, and transaction summaries for buyer and seller.</p></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><div class="font-headline text-4xl text-tertiary-fixed-dim mb-2">4</div><p class="font-headline text-lg text-primary mb-1">Loan Disclosures</p><p class="text-sm text-on-surface-variant font-light">Escrow account details, loan transfer policy, assumption terms, late payment penalties, demand feature disclosures.</p></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6 sm:col-span-2"><div class="font-headline text-4xl text-tertiary-fixed-dim mb-2">5</div><p class="font-headline text-lg text-primary mb-1">Loan Calculations &amp; Contacts</p><p class="text-sm text-on-surface-variant font-light">Total interest paid over loan life, APR, Total Interest Percentage (TIP), and contact information for all parties.</p></div>
</div>
<h2>How to Use the Form Effectively</h2>
<p>The most effective way to use your Closing Disclosure is to compare it directly to your original Loan Estimate. The forms use the same section structure for exactly this purpose.</p>
<ol><li><strong>Start with Section A</strong> on page 2 — lender origination charges have zero tolerance under TRID</li><li><strong>Check your interest rate</strong> on page 1 against your rate lock confirmation</li><li><strong>Review cash to close</strong> on page 3 — the comparison column shows exactly how it changed from your LE</li><li><strong>Verify lender credits</strong> appear if any were promised</li><li><strong>Look for new fees</strong> that weren't on your Loan Estimate — especially in Section A</li></ol>
<div class="callout"><div class="callout-label">Sample Form Available from CFPB</div><p>The CFPB publishes a sample Closing Disclosure form with explanatory annotations at consumerfinance.gov. Reviewing it before your actual CD arrives can help you understand the layout and know where to look.</p></div>
<h2>What to Do If Something Looks Wrong</h2>
<p>If you find a fee that increased, a new fee that wasn't on your Loan Estimate, or anything that doesn't look right, contact your lender in writing before closing. Email creates a record. Ask them to identify the valid changed circumstance that justifies the discrepancy. You have the right to ask questions about every line item — before you sign anything at the closing table.</p>
