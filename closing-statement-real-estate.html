<h2>Closing Statement — The Basic Definition</h2>
<p>A closing statement is a document that summarizes all the financial transactions involved in a real estate closing. It shows what money is coming in, what's going out, and who ends up with what. Every real estate closing produces at least one closing statement, and both buyers and sellers typically receive their own version.</p>
<p>The term "closing statement" is used loosely. For homebuyers using a mortgage, the primary closing statement is the <strong>Closing Disclosure</strong> — the federally standardized document produced by your lender. For cash purchases, it's typically an ALTA settlement statement prepared by the title company.</p>
<h2>Closing Statement vs. Closing Disclosure</h2>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-8">
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><h3 class="font-headline text-xl text-primary mt-0 mb-3">Closing Disclosure (Mortgage)</h3><ul class="text-sm"><li>Federally standardized CFPB form</li><li>Required for all residential mortgage transactions</li><li>Must be delivered 3 business days before closing</li><li>Lender fees subject to TRID tolerance limits</li></ul></div>
  <div class="bg-surface-container-lowest border border-outline-variant/20 p-6"><h3 class="font-headline text-xl text-primary mt-0 mb-3">Settlement Statement (Cash)</h3><ul class="text-sm"><li>Prepared by title company or settlement agent</li><li>Used for cash purchases and commercial deals</li><li>No mandatory delivery timeline</li><li>Not subject to TRID tolerance rules</li></ul></div>
</div>
<h2>What a Closing Statement Includes (Buyer Side)</h2>
<ul><li>Loan terms — amount, interest rate, monthly payment</li><li>Closing costs — all lender fees, third-party fees, title charges, government fees</li><li>Prepaids — prepaid interest, property insurance, taxes</li><li>Cash to close — exact amount needed at closing</li><li>Transaction summary — how funds flow between buyer, seller, and lender</li><li>Seller credits — any amounts the seller agreed to contribute</li></ul>
<h2>The Seller's Closing Statement</h2>
<p>Sellers receive a separate settlement statement showing their side: the sale price, real estate commissions, seller-paid closing costs, property tax prorations, outstanding mortgage payoff amounts, and net proceeds.</p>
<div class="callout"><div class="callout-label">Tax Note</div><p>Save your closing statement for tax purposes. Buyers may deduct certain items like prepaid mortgage interest and property taxes paid at closing. Sellers use it to calculate capital gains. Consult a tax professional for your situation.</p></div>
<h2>What Buyers Should Focus On</h2>
<ol><li>Compare every fee to your original Loan Estimate — especially Section A lender charges</li><li>Verify the cash-to-close figure matches what you've planned to bring</li><li>Confirm seller credits appear exactly as negotiated in your purchase agreement</li><li>Review property tax prorations for accuracy</li><li>Verify any promised lender credits</li></ol>
