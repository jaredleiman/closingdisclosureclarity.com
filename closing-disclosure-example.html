<div class="callout"><div class="callout-label">Note</div><p>All numbers below are illustrative for a $480,000 purchase with a $384,000 loan (20% down). Your actual figures will vary.</p></div>
<h2>Page 1 — Loan Terms</h2>
<p>The top of page 1 gives you the essential loan facts. Verify these match your rate lock confirmation exactly:</p>
<ul><li><strong>Loan Amount:</strong> $384,000</li><li><strong>Interest Rate:</strong> 7.125% (fixed)</li><li><strong>Monthly Principal &amp; Interest:</strong> $2,588</li><li><strong>Prepayment Penalty:</strong> No / <strong>Balloon Payment:</strong> No</li></ul>
<h2>Page 2 — Annotated Fee Examples</h2>
<h3>Section A — Origination Charges</h3>
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-sm overflow-hidden my-6">
  <div class="bg-primary text-on-primary px-5 py-3 flex justify-between text-xs font-medium uppercase tracking-wider"><span>Section A — Origination Charges</span><span class="text-tertiary-fixed-dim">Zero tolerance</span></div>
  <div class="divide-y divide-outline-variant/10">
    <div class="flex justify-between items-center px-5 py-3 bg-primary-fixed/20"><span class="text-sm text-on-surface">Origination fee (0.5%)</span><div class="flex items-center gap-3"><span class="font-headline">$1,920</span><span class="text-[9px] font-bold uppercase bg-primary-fixed text-on-primary-fixed-variant px-2 py-0.5">Matches LE</span></div></div>
    <div class="flex justify-between items-center px-5 py-3 bg-error-container/30"><span class="text-sm text-on-surface">Underwriting fee</span><div class="flex items-center gap-3"><span class="font-headline">$1,295</span><span class="text-[9px] font-bold uppercase bg-error-container text-on-error-container px-2 py-0.5">↑ $350 from LE</span></div></div>
    <div class="flex justify-between items-center px-5 py-3 bg-[#FEF0C4]/40"><span class="text-sm text-on-surface">Processing fee</span><div class="flex items-center gap-3"><span class="font-headline">$795</span><span class="text-[9px] font-bold uppercase bg-[#FEF0C4] text-[#8A6500] px-2 py-0.5">New — not on LE</span></div></div>
  </div>
</div>
<p>The underwriting fee increased $350 — a potential zero-tolerance violation. The processing fee didn't appear on the LE at all; adding a new Section A fee is also a violation. Both warrant a direct written inquiry to your lender.</p>
<h3>Section B — Services You Cannot Shop For</h3>
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-sm overflow-hidden my-6">
  <div class="bg-primary text-on-primary px-5 py-3 flex justify-between text-xs font-medium uppercase tracking-wider"><span>Section B</span><span class="text-tertiary-fixed-dim">Zero tolerance</span></div>

  </div>

<h2>Page 3 — Cash to Close</h2>
<ul><li><strong>Down payment:</strong> $96,000 (20%)</li><li><strong>Closing costs:</strong> $9,847</li><li><strong>Seller credit:</strong> -$3,500</li><li><strong>Final cash to close:</strong> $102,347</li></ul>
<p>If this number is significantly higher than your Loan Estimate showed, trace the difference back to specific line items. Common culprits: fee increases in Section A or B, or escrow adjustments.</p>
<h2>The Most Important Numbers to Verify</h2>
<ol><li>Interest rate — matches your rate lock exactly</li><li>Loan amount — matches what you agreed to borrow</li><li>All Section A fees — identical to your Loan Estimate or explained by a valid changed circumstance</li><li>Lender credits — any credits promised on your LE appear on the CD</li><li>Cash to close — you can account for any difference from your LE estimate</li></ol>
