<h2>What the Rule Actually Requires</h2>
<p>Under the TRID rule, your mortgage lender is required by federal law to deliver your Closing Disclosure at least three business days before your loan consummation — which, for most transactions, means the day you sign your closing documents.</p>
<p>This rule exists because the CFPB recognized that homebuyers were routinely receiving complex financial documents moments before signing — without adequate time to review them. The three-day window is designed to give you a genuine opportunity to read the document, compare it to your Loan Estimate, identify errors, and ask questions before you're legally committed.</p>
<h2>What Counts as a Business Day</h2>
<p>For the Closing Disclosure three-day rule, "business days" are defined as all calendar days except <strong>Sundays</strong> and <strong>federal public holidays</strong>. This is different from the traditional definition — <strong>Saturday counts as a business day.</strong></p>
<div class="callout"><div class="callout-label">Calendar Example</div><p>If your closing is on Friday and your lender delivers the CD on Monday evening: Tuesday is day 1, Wednesday is day 2, Thursday is day 3. The earliest you can legally close is Friday — exactly on schedule. If the CD arrives on Wednesday, Friday is only day 2. Closing must be pushed to at least Saturday.</p></div>
<h2>What Happens If Your Lender Sends It Late</h2>
<p>If your lender fails to deliver the Closing Disclosure the required number of business days before your scheduled closing, the closing must be postponed. You cannot legally waive this waiting period in most circumstances. Don't let anyone pressure you into proceeding without your full review window.</p>
<div class="alert"><div class="alert-label">Watch for This</div><p>Some lenders send the Closing Disclosure by mail rather than electronically. If mailed, the law assumes you receive it three business days after mailing — meaning the total waiting period from the mailing date is effectively six business days. Always confirm electronic delivery.</p></div>
<h2>When the 3-Day Clock Resets</h2>
<p>Certain changes after the initial CD is issued trigger a new three-day waiting period:</p>
<ul><li>The APR increases by more than 0.125% (fixed) or 0.25% (variable)</li><li>The loan product changes — for example, fixed to adjustable rate</li><li>A prepayment penalty is added</li></ul>
<h2>How to Use Those Three Days</h2>
<ul><li><strong>Day 1:</strong> Compare the CD to your Loan Estimate side by side. Flag any Section A fee that increased.</li><li><strong>Day 2:</strong> Research unfamiliar fees. Any new fee in Section A is a potential TRID violation.</li><li><strong>Day 3:</strong> Contact your lender in writing with any questions. Confirm cash-to-close and logistics.</li></ul>
